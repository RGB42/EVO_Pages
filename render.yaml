# ═══════════════════════════════════════════════════════
# render.yaml – für RGB42/EVO_Pages Repository
#
# Dieses Repo wird von GitHub Actions automatisch befüllt:
#   /              → Marketing-Website (HTML/CSS/JS)
#   /app/          → Flutter Web App
#
# Render hostet alles als einen Static Site unter umadum.app
# ═══════════════════════════════════════════════════════
services:
  - type: web
    name: umadum
    runtime: static
    staticPublishPath: .
    pullRequestPreviewsEnabled: false
    routes:
      # Flutter App Canonical Entry
      - type: rewrite
        source: /app
        destination: /app/index.html
      # Flutter App — SPA-Fallback (alles unter /app/ → /app/index.html)
      - type: rewrite
        source: /app/*
        destination: /app/index.html
      # Statische Website-Dateien direkt ausliefern (kein Rewrite nötig)